# FlowDesk — ambiente local de desenvolvimento.
#
# Sobe Postgres 16 com volume persistente. A API ainda roda como
# processo Node local (mais rápido pra dev com hot reload), conectando
# em localhost:5432.
#
# Comandos:
#   docker compose up -d        # sobe postgres em background
#   docker compose down         # para
#   docker compose down -v      # para + remove volume (apaga dados!)
#   docker compose logs -f db   # acompanha logs

services:
  db:
    image: postgres:16-alpine
    container_name: flowdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk
      POSTGRES_DB: flowdesk
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --locale=C.UTF-8'
      TZ: America/Sao_Paulo
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowdesk -d flowdesk']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: flowdesk-postgres-data
