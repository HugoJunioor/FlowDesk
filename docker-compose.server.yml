# FlowDesk — compose para o servidor onde JA existem Traefik + Postgres rodando.
#
# - Reusa Traefik global do servidor (rede 'host') via labels Docker
# - Reusa Postgres do compose postgres via rede 'cfo_default' (cria DB `flowdesk` previamente)
# - Aplica IP whitelist (vpn-only) e SSL automatico (cert resolver 'letsencrypt' do Traefik global)
#
# Uso (no diretorio /opt/flowdesk/app no servidor):
#   docker compose -f docker-compose.server.yml build
#   docker compose -f docker-compose.server.yml up -d
#   docker compose -f docker-compose.server.yml logs -f api

services:
  api:
    build:
      # Contexto = root do monorepo (igual ao web). O Dockerfile precisa
      # do package-lock.json da raiz pra resolver workspaces @flowdesk/*.
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flowdesk-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      TZ: America/Sao_Paulo
      APP_BASE_URL: "https://${DOMAIN}"
      ALLOWED_ORIGINS: "https://${DOMAIN}"
      COOKIE_DOMAIN: "${DOMAIN}"
      COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # Traefik global usa network cfo_default pra alcancar este container
      - "traefik.docker.network=cfo_default"
      - "traefik.http.services.flowdesk-api.loadbalancer.server.port=4000"
      # /api/v1/*, /health, /healthz vao pra API
      - "traefik.http.routers.flowdesk-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/`) || Path(`/health`) || Path(`/healthz`))"
      - "traefik.http.routers.flowdesk-api.entrypoints=websecure"
      - "traefik.http.routers.flowdesk-api.tls=true"
      - "traefik.http.routers.flowdesk-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flowdesk-api.priority=10"
      # IP whitelist (VPN-only). A middleware eh declarada AQUI E no web
      # com o mesmo nome — Traefik dedupe, mas declarar nos dois evita
      # o router api ser desativado quando web cai/recarrega primeiro.
      # Antes: erro "middleware flowdesk-vpn@docker does not exist" se
      # web ainda nao tinha registrado labels — dropava /api inteiro.
      - "traefik.http.middlewares.flowdesk-vpn.ipallowlist.sourcerange=${VPN_IPS}"
      - "traefik.http.routers.flowdesk-api.middlewares=flowdesk-vpn@docker"
    networks:
      # cfo_default = rede onde o Postgres (postgres) esta + Traefik consegue ler
      - cfo_default
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_BUILD_SHA: "${BUILD_SHA:-prod}"
        VITE_BUILD_DATE: "${BUILD_DATE:-}"
    container_name: flowdesk-web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=cfo_default"
      - "traefik.http.services.flowdesk-web.loadbalancer.server.port=80"
      - "traefik.http.routers.flowdesk-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.flowdesk-web.entrypoints=websecure"
      - "traefik.http.routers.flowdesk-web.tls=true"
      - "traefik.http.routers.flowdesk-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flowdesk-web.priority=1"
      # Middleware compartilhada: IP whitelist das VPNs autorizadas.
      # Aplicada nos routers de web e api.
      - "traefik.http.middlewares.flowdesk-vpn.ipallowlist.sourcerange=${VPN_IPS}"
      - "traefik.http.routers.flowdesk-web.middlewares=flowdesk-vpn@docker"
    networks:
      - cfo_default
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Container auxiliar: serve endpoints v1 + proxy Slack/Telegram + dispatch email/push.
  # Persiste em /opt/flowdesk/app/data (bind mount).
  legacy_state:
    build:
      context: ./legacy-state
    container_name: flowdesk-legacy-state
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      PORT: '8090'
      EMAIL_ENABLED: "${EMAIL_ENABLED}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      APP_BASE_URL: "https://${DOMAIN}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME:-just_floow_bot}"
      DATABASE_URL: "${DATABASE_URL}"
      DOMAIN: "${DOMAIN}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_CLIENT_ID: "${SLACK_CLIENT_ID:-}"
      SLACK_CLIENT_SECRET: "${SLACK_CLIENT_SECRET:-}"
      DAILY_REMINDER_ENABLED: "${DAILY_REMINDER_ENABLED:-false}"
      WEB_DATA_DIR: /web-data
      TZ: America/Sao_Paulo
    volumes:
      - /opt/flowdesk/app/data:/data
      # Mount read-only para o cron do lembrete diario parsear realDemands.ts
      - /opt/flowdesk/app/apps/web/src/data:/web-data:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:8090/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=cfo_default
      - traefik.http.services.fdlegacy.loadbalancer.server.port=8090
      - traefik.http.routers.fdlegacy.rule=Host(`${DOMAIN}`) && (PathPrefix(`/__state`) || PathPrefix(`/notes`) || PathPrefix(`/infra`) || PathPrefix(`/notifications`) || PathPrefix(`/notification-preferences`) || PathPrefix(`/slack`) || PathPrefix(`/auth/slack`) || PathPrefix(`/telegram`) || PathPrefix(`/sync-status`) || PathPrefix(`/demands-snapshot`) || PathPrefix(`/daily-reminder`))
      - traefik.http.routers.fdlegacy.entrypoints=websecure
      - traefik.http.routers.fdlegacy.tls.certresolver=letsencrypt
      - traefik.http.routers.fdlegacy.priority=300
      # Router separado pro webhook do Telegram — sem o middleware VPN
      # porque os servers do Telegram nao estao na nossa whitelist.
      - traefik.http.routers.fdtgevents.rule=Host(`${DOMAIN}`) && PathPrefix(`/telegram-events/`)
      - traefik.http.routers.fdtgevents.entrypoints=websecure
      - traefik.http.routers.fdtgevents.tls=true
      - traefik.http.routers.fdtgevents.tls.certresolver=letsencrypt
      - traefik.http.routers.fdtgevents.service=fdlegacy
      - traefik.http.routers.fdtgevents.priority=400
    networks:
      - cfo_default

networks:
  # Rede do compose do cfo (onde mora postgres). Externa — ja existe.
  cfo_default:
    external: true
    name: cfo_default
