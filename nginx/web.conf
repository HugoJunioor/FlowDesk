# nginx interno do container web — serve o build estatico do Vite
# Este arquivo e montado em /etc/nginx/conf.d/default.conf dentro do container web.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache agressivo para assets com hash no nome (gerado pelo Vite)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota desconhecida serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
