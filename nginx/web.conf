# nginx interno do container web — serve o build estatico do Vite
# Este arquivo e montado em /etc/nginx/conf.d/default.conf dentro do container web.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS — ativo pois o container web fica atras do proxy reverso HTTPS em prod.
    # Em dev (HTTP puro) este header e ignorado pelo browser se nao ha HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache agressivo para assets com hash no nome (gerado pelo Vite)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota desconhecida serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
