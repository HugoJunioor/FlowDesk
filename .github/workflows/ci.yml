name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs antigos quando push novo chega no mesmo PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      # Build em modo demo: garante que o repo rode sem realDemands.ts (dados privados)
      - run: npm run build
        env:
          VITE_DEMO_MODE: "true"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      # Roda com coverage — falha se thresholds em vitest.config.ts caírem
      - run: npm run test:coverage
      # Sobe relatorio HTML pra inspecao caso queira investigar regressao
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
