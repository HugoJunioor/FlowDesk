name: E2E

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/src/**"
      - "apps/web/e2e/**"
      - "apps/web/playwright.config.ts"
      - "apps/web/package.json"
      - "package-lock.json"

# Cancela runs antigos quando push novo chega no mesmo PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci --legacy-peer-deps

      # Cache do binário do Chromium pra evitar download em todo run.
      # Versão do Playwright vem do package-lock; usamos o nome do
      # arquivo de lock como cache key surrogate (muda quando dep muda).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      # Install deps do SO mesmo com cache hit — pacotes apt-get nao ficam
      # cached entre runs.
      - name: Install Playwright OS deps (with cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/web
        run: npx playwright install-deps chromium

      # Build em modo demo (VITE_DEMO_MODE=true) — sem dados reais e com
      # Admin@1 funcionando, igual ao Vercel preview e ao smoke spec.
      - name: Run E2E
        working-directory: apps/web
        run: npm run test:e2e
        env:
          VITE_DEMO_MODE: "true"
          VITE_DISABLE_HTTPS: "1"
          CI: "true"

      # Em caso de falha, sobe o relatório HTML pra inspeção
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
