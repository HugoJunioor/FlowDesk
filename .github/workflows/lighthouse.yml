name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/src/**"
      - "apps/web/index.html"
      - "apps/web/vite.config.ts"
      - "apps/web/package.json"
      - "package-lock.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          # Build em modo demo no CI — sem dados reais
          VITE_DEMO_MODE: "true"
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=.lighthouserc.json || echo "Lighthouse warnings logged"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true
