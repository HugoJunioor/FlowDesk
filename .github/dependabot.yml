version: 2
updates:
  # Updates de pacotes npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "deps"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Agrupa minor/patch updates pra reduzir ruido de PRs
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major updates manuais (breaking changes precisam de revisao)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Updates de actions do GitHub
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
